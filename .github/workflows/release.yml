name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  release:
    name: Build, Release & Publish
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      # Mint a short-lived token from the release-bot GitHub App so the
      # version-bump push can bypass the branch ruleset (the App is in the
      # ruleset bypass list; github-actions[bot] cannot be added there).
      - name: Generate App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.RELEASE_BOT_APP_ID }}
          private-key: ${{ secrets.RELEASE_BOT_PRIVATE_KEY }}

      - uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: https://npm.pkg.github.com
          scope: "@lennardgeissler"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

      # ── Versioning ────────────────────────────────────────────────────────
      # Conventional-Commit-driven bump (see scripts/bump-version.js):
      #   feat:                              -> minor
      #   fix: | perf:                       -> patch
      #   feat!: / BREAKING CHANGE:          -> major (clamped to minor on 0.x)
      #   chore/docs/style/refactor/test/ci/build/...  -> no release
      #
      # `[skip bump]` in the head commit message keeps the version as-is and
      # still publishes — for release/* branches that pre-set the target
      # version. Without that flag, a push with no release-worthy commits
      # short-circuits the rest of the job.
      - name: Resolve release version
        id: version
        run: |
          if [[ "${{ github.event.head_commit.message }}" == *"[skip bump]"* ]]; then
            echo "should_release=true" >> $GITHUB_OUTPUT
            echo "bumped=false" >> $GITHUB_OUTPUT
          else
            node scripts/bump-version.js
            SHOULD_RELEASE=$(node -p "require('./release-info.json').shouldRelease")
            echo "should_release=$SHOULD_RELEASE" >> $GITHUB_OUTPUT
            echo "bumped=$SHOULD_RELEASE" >> $GITHUB_OUTPUT
            if [[ "$SHOULD_RELEASE" == "false" ]]; then
              echo "No release-worthy commits since last tag — skipping release steps." \
                >> $GITHUB_STEP_SUMMARY
            fi
          fi
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Commit & tag version bump
        if: steps.version.outputs.should_release == 'true'
        run: |
          git config user.name  "release-bot[bot]"
          git config user.email "release-bot[bot]@users.noreply.github.com"
          if [[ "${{ steps.version.outputs.bumped }}" == "true" ]]; then
            git add \
              package.json \
              apps/extension/package.json \
              packages/detection-engine/package.json \
              packages/policy-engine/package.json \
              packages/shared-types/package.json \
              apps/extension/public/manifest.json
            git commit -m "chore: release v${{ steps.version.outputs.version }} [skip ci]"
          fi
          git tag "v${{ steps.version.outputs.version }}"
          git push origin main --follow-tags

      # ── Package extension ─────────────────────────────────────────────────
      - name: Zip extension dist
        if: steps.version.outputs.should_release == 'true'
        run: |
          cd apps/extension/dist
          zip -r "${{ github.workspace }}/ai-compliance-extension-v${{ steps.version.outputs.version }}.zip" .

      # ── GitHub Release ────────────────────────────────────────────────────
      - name: Create GitHub Release
        if: steps.version.outputs.should_release == 'true'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: ai-compliance-extension-v${{ steps.version.outputs.version }}.zip
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}

      # ── GitHub Packages (npm) ─────────────────────────────────────────────
      # Build a clean publish directory: only the bundled dist + a slim
      # package.json without workspace:* dev/runtime deps, so the artifact
      # is installable and visible under the repo's "Packages" tab.
      - name: Prepare npm publish dir
        if: steps.version.outputs.should_release == 'true'
        run: node scripts/prepare-npm-publish.mjs
        env:
          VERSION: ${{ steps.version.outputs.version }}

      - name: Publish to GitHub Packages
        if: steps.version.outputs.should_release == 'true'
        run: npm publish --access restricted
        working-directory: .release-publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
